<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260329h" />
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260329h" />
<link rel="shortcut icon" href="./favicon.ico?v=20260329h" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png?v=20260329h" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f5f3ee;
    --section-gutter: 64px;
  }
  html, body { min-height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(circle at top left, rgba(201,168,76,0.12), transparent 28%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 24%),
      linear-gradient(180deg, #0b0b0c 0%, #080808 100%);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
  }
		  .error-shell {
		    position: relative;
		    min-height: 100vh;
		    padding: 24px var(--section-gutter);
		  }
	  .error-top {
	    min-height: calc(100vh - 48px);
	    display: grid;
	    grid-template-rows: auto 1fr;
	  }
  .error-brand {
    display: inline-grid;
    grid-template-columns: 1fr;
    align-items: start;
    gap: 4px;
    width: fit-content;
    text-decoration: none;
    color: var(--white);
  }
	  .error-brand img {
	    display: block;
	    height: clamp(24px, 2vw, 34px);
	    width: auto;
	  }
  .error-brand-tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 26px;
    padding: 0 11px;
    border: 1px solid rgba(201,168,76,0.24);
    background: linear-gradient(180deg, rgba(201,168,76,0.16) 0%, rgba(201,168,76,0.06) 100%);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 1;
  }
  .error-brand-tag.error-brand-tag-spread {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 90%;
    min-height: 0;
    margin: 0 auto;
    padding: 0;
    border: 0;
    background: none;
    font-size: 11px;
    letter-spacing: 0;
    line-height: 1.1;
  }
  .error-brand-tag.error-brand-tag-spread span {
    display: inline-block;
  }
  .error-main {
    display: grid;
    place-items: center;
    padding: 32px 0;
  }
  .error-card {
    width: min(100%, 780px);
    padding: clamp(28px, 5vw, 52px);
    border: 1px solid var(--border);
    background:
      linear-gradient(180deg, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.03) 18%, transparent 40%),
      linear-gradient(180deg, rgba(17,17,20,0.98) 0%, rgba(10,10,12,0.98) 100%);
    box-shadow: 0 30px 90px rgba(0,0,0,0.42);
  }
  .error-title {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 74px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.03em;
  }
  .error-title em {
    font-style: italic;
    color: var(--gold);
  }
  .error-back-link {
    display: block;
    width: fit-content;
    margin: 28px auto 0;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: underline;
    text-underline-offset: 0.22em;
    text-decoration-thickness: 1px;
    transition: color 0.18s ease;
  }
  .error-back-link:hover {
    color: var(--gold-light);
  }
		  @media (max-width: 1024px) {
		    :root { --section-gutter: 32px; }
		  }
		  @media (max-width: 640px) {
		    :root { --section-gutter: 24px; }
		    .error-shell { padding: 20px var(--section-gutter); }
		    .error-top { min-height: calc(100vh - 40px); }
		    .error-main { padding: 24px 0; }
	      .error-brand { gap: 3px; }
	      .error-brand img { height: 14px; }
	      .error-brand-tag.error-brand-tag-spread { font-size: 10px; }
		  }
		  @media (max-width: 480px) {
		    :root { --section-gutter: 20px; }
		  }
	</style>
</head>
<body>
  <div class="error-shell">
    <div class="error-top">
      <a href="./" class="error-brand" aria-label="MOSION Studio home">
        <img src="./logo-wordmark.png" alt="MOSION" width="168" height="20" />
        <span class="error-brand-tag error-brand-tag-spread" aria-hidden="true">
          <span>S</span><span>T</span><span>U</span><span>D</span><span>I</span><span>O</span>
        </span>
      </a>

      <main class="error-main">
        <section class="error-card" aria-labelledby="errorTitle">
          <h1 class="error-title" id="errorTitle">The address you opened does <em>not exist.</em></h1>
          <a href="./" class="error-back-link">Back to Mosion Studio</a>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
