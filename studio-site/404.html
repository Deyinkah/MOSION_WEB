<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found | MOSION Studio</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260329h" />
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260329h" />
<link rel="shortcut icon" href="./favicon.ico?v=20260329h" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png?v=20260329h" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --black: #080808;
    --deep: #0d0d0f;
    --surface: #111114;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(201,168,76,0.28);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f5f3ee;
    --muted: rgba(245,243,238,0.62);
    --muted-soft: rgba(245,243,238,0.4);
  }
  html, body { min-height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(circle at top left, rgba(201,168,76,0.12), transparent 28%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 24%),
      linear-gradient(180deg, #0b0b0c 0%, #080808 100%);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.028;
    pointer-events: none;
  }
  .error-shell {
    position: relative;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    padding: 28px;
  }
  .error-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: fit-content;
    text-decoration: none;
    color: var(--white);
  }
  .error-brand img {
    display: block;
    height: 20px;
    width: auto;
  }
  .error-brand-tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 26px;
    padding: 0 11px;
    border: 1px solid rgba(201,168,76,0.24);
    background: linear-gradient(180deg, rgba(201,168,76,0.16) 0%, rgba(201,168,76,0.06) 100%);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 1;
  }
  .error-main {
    display: grid;
    place-items: center;
    padding: 32px 0;
  }
  .error-card {
    width: min(100%, 780px);
    padding: clamp(28px, 5vw, 52px);
    border: 1px solid var(--border);
    background:
      linear-gradient(180deg, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.03) 18%, transparent 40%),
      linear-gradient(180deg, rgba(17,17,20,0.98) 0%, rgba(10,10,12,0.98) 100%);
    box-shadow: 0 30px 90px rgba(0,0,0,0.42);
  }
  .error-kicker {
    margin: 0 0 20px;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .error-title {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 74px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.03em;
  }
  .error-title em {
    font-style: italic;
    color: var(--gold);
  }
  .error-copy {
    margin: 22px 0 0;
    max-width: 34ch;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.8;
  }
  .error-note {
    margin: 18px 0 0;
    color: var(--muted-soft);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    line-height: 1.9;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .error-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 30px;
  }
  .error-btn-primary,
  .error-btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 52px;
    padding: 0 24px;
    text-decoration: none;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
  }
  .error-btn-primary {
    background: var(--gold);
    color: var(--black);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .error-btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  .error-btn-secondary {
    border: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.02);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .error-btn-secondary:hover {
    border-color: rgba(201,168,76,0.46);
    color: var(--gold-light);
    transform: translateY(-1px);
  }
  .error-btn-primary svg,
  .error-btn-secondary svg {
    width: 14px;
    height: 14px;
    flex: 0 0 auto;
  }
  @media (max-width: 640px) {
    .error-shell { padding: 20px; }
    .error-main { padding: 24px 0; }
    .error-copy { font-size: 15px; }
    .error-actions { flex-direction: column; }
    .error-btn-primary,
    .error-btn-secondary { width: 100%; }
  }
</style>
</head>
<body>
  <div class="error-shell">
    <a href="/" class="error-brand" aria-label="MOSION Studio home">
      <img src="./logo-wordmark.png" alt="MOSION" />
      <span class="error-brand-tag">Studio</span>
    </a>

    <main class="error-main">
      <section class="error-card" aria-labelledby="errorTitle">
        <p class="error-kicker">Error 404</p>
        <h1 class="error-title" id="errorTitle">This page is off the <em>release slate.</em></h1>
        <p class="error-copy">
          The address you opened does not exist, has moved, or has not been connected to the studio routing yet.
        </p>
        <p class="error-note">Unknown studio routes now land here instead of the default host error page.</p>
        <div class="error-actions">
          <a href="/" class="error-btn-primary">
            Back to Studio Site
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M1 7h12M8 2l5 5-5 5" />
            </svg>
          </a>
          <a href="/signin" class="error-btn-secondary">
            Open Studio Sign In
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M1 7h12M8 2l5 5-5 5" />
            </svg>
          </a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
